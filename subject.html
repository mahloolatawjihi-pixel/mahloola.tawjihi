<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المادة | محلولة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#080a14;
    --bg-1:#0d1122;
    --bg-2:#12172b;
    --violet:#7c5cfc;
    --blue:#4c8dff;
    --pink:#ff6b9d;
    --gold:#ffc65c;
    --text-0:#f3f4fb;
    --text-1:#aab0cc;
    --text-2:#727a9c;
    --glass-bd:rgba(255,255,255,0.1);
    --glass-bg:rgba(255,255,255,0.05);
    --shadow-soft:0 18px 50px -20px rgba(0,0,0,.55);
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  ::selection{background:color-mix(in srgb, var(--violet) 45%, transparent);color:#fff;}
  body{
    background:var(--bg-0);
    color:var(--text-0);
    font-family:'Tajawal', sans-serif;
    overflow-x:hidden;
    position:relative;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }

  .bg-mesh{position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none;}
  .blob{position:absolute; border-radius:50%; filter:blur(90px); opacity:.32; will-change:transform;}
  .blob-1{width:480px;height:480px; background:radial-gradient(circle, var(--violet), transparent 70%); top:-140px; right:-120px; animation:drift1 22s ease-in-out infinite;}
  .blob-2{width:420px;height:420px; background:radial-gradient(circle, var(--blue), transparent 70%); bottom:-160px; left:-100px; animation:drift2 26s ease-in-out infinite;}
  .blob-3{width:340px;height:340px; background:radial-gradient(circle, var(--gold), transparent 70%); top:38%; left:38%; opacity:.14; animation:drift3 28s ease-in-out infinite;}
  @keyframes drift1{0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(-50px,50px) scale(1.15);}}
  @keyframes drift2{0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(50px,-30px) scale(1.1);}}
  @keyframes drift3{0%,100%{transform:translate(0,0) scale(1);} 50%{transform:translate(35px,35px) scale(1.2);}}

  .grain{position:fixed; inset:0; z-index:1; pointer-events:none;
    background-image:radial-gradient(rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size:3px 3px; opacity:.5;}

  section, header, footer, nav, main{position:relative; z-index:2;}

  .wrap{max-width:980px; margin:0 auto; padding:0 24px;}

  .glass{
    background:var(--glass-bg);
    border:1px solid var(--glass-bd);
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    border-radius:22px;
    box-shadow:var(--shadow-soft), inset 0 1px 0 rgba(255,255,255,.06);
  }

  nav{padding:18px 0;}
  .nav-inner{
    max-width:980px; margin:0 auto;
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 22px; border-radius:999px;
  }
  .logo{
    font-family:'Lalezar', cursive; font-size:1.4rem; text-decoration:none;
    background:linear-gradient(90deg, var(--blue), var(--violet) 60%, var(--pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .back-link{
    color:var(--text-1); text-decoration:none; font-size:.9rem; font-weight:500;
    display:flex; align-items:center; gap:6px;
    padding:8px 14px; border-radius:999px;
    transition:color .25s, background .25s;
  }
  .back-link:hover{color:var(--text-0); background:rgba(255,255,255,.06);}

  .crumb{
    display:flex; align-items:center; gap:8px; justify-content:center;
    font-size:.82rem; color:var(--text-2); margin:38px 0 8px;
    letter-spacing:.02em;
  }
  .crumb a{color:var(--text-2); text-decoration:none; transition:color .2s;}
  .crumb a:hover{color:var(--text-1);}
  .crumb .sep{opacity:.5;}
  .crumb .current{color:var(--text-1); font-weight:700;}

  .subj-header{
    text-align:center;
    padding:20px 0 40px;
  }
  .subj-header .ic-wrap{
    width:84px; height:84px; margin:0 auto 16px;
    border-radius:24px;
    display:flex; align-items:center; justify-content:center;
    background:linear-gradient(145deg, rgba(124,92,252,.22), rgba(76,141,255,.1));
    border:1px solid rgba(255,255,255,.12);
    box-shadow:0 16px 40px -18px rgba(124,92,252,.55);
  }
  .subj-header .ic{
    font-size:2.4rem;
    display:block;
    filter:drop-shadow(0 6px 16px rgba(124,92,252,.35));
  }
  .subj-header h1{
    font-family:'Lalezar', cursive;
    font-size:clamp(2.1rem, 5vw, 2.9rem);
    letter-spacing:-.01em;
    margin-bottom:10px;
  }
  .subj-header h1 span{
    background:linear-gradient(100deg, var(--blue), var(--violet), var(--pink));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subj-header p{color:var(--text-1); font-size:.95rem; line-height:1.7;}

  .stats-row{
    display:flex; justify-content:center; gap:12px; margin-top:26px; flex-wrap:wrap;
  }
  .stat-pill{
    padding:10px 18px; border-radius:999px; font-size:.8rem; color:var(--text-1);
    display:flex; align-items:center; gap:7px;
    transition:transform .3s var(--ease), border-color .3s;
  }
  .stat-pill:hover{transform:translateY(-2px); border-color:rgba(255,255,255,.18);}
  .stat-pill b{color:var(--text-0); font-weight:800; font-variant-numeric:tabular-nums;}

  .cat-tabs{
    display:flex; justify-content:center; gap:10px; margin:38px 0 26px;
    flex-wrap:wrap;
  }
  .cat-tab{
    padding:12px 28px;
    border-radius:16px;
    font-size:.92rem;
    font-weight:800;
    letter-spacing:.02em;
    cursor:pointer;
    color:var(--text-1);
    border:1px solid var(--glass-bd);
    background:rgba(255,255,255,.03);
    transition:all .3s var(--ease);
    display:flex; align-items:center; gap:8px;
  }
  .cat-tab .count{
    font-size:.72rem;
    background:rgba(255,255,255,.08);
    padding:2px 8px;
    border-radius:999px;
    font-weight:700;
    font-variant-numeric:tabular-nums;
  }
  .cat-tab:hover{color:var(--text-0); border-color:rgba(255,255,255,.18); background:rgba(255,255,255,.05);}
  .cat-tab.active{
    color:#fff;
    background:linear-gradient(120deg, var(--violet), var(--blue));
    border-color:transparent;
    box-shadow:0 10px 28px -8px rgba(124,92,252,.55), inset 0 1px 0 rgba(255,255,255,.18);
  }
  .cat-tab.active .count{background:rgba(255,255,255,.22);}

  .item-list{
    display:flex;
    flex-direction:column;
    gap:14px;
    margin-bottom:80px;
  }

  .item-card{
    display:flex;
    align-items:center;
    gap:18px;
    padding:20px 22px;
    text-decoration:none;
    color:inherit;
    transition:transform .35s var(--ease), border-color .3s, background .3s, box-shadow .35s var(--ease);
    position:relative;
    overflow:hidden;
    animation:cardIn .4s var(--ease) both;
  }
  .item-card:nth-child(1){animation-delay:.02s}
  .item-card:nth-child(2){animation-delay:.08s}
  .item-card:nth-child(3){animation-delay:.14s}
  .item-card:nth-child(4){animation-delay:.2s}
  .item-card:nth-child(5){animation-delay:.26s}
  @keyframes cardIn{
    from{opacity:0; transform:translateY(12px);}
    to{opacity:1; transform:translateY(0);}
  }
  .item-card::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(120deg, rgba(124,92,252,.12), rgba(76,141,255,.06));
    opacity:0;
    transition:opacity .3s;
  }
  .item-card:hover{
    transform:translateY(-4px);
    border-color:rgba(255,255,255,.22);
    box-shadow:0 18px 36px -20px rgba(76,141,255,.4);
  }
  .item-card:hover::before{opacity:1;}

  .item-badge{
    flex-shrink:0;
    width:52px; height:52px;
    border-radius:15px;
    display:flex; align-items:center; justify-content:center;
    font-size:1.4rem;
    background:linear-gradient(135deg, var(--violet), var(--blue));
    position:relative; z-index:1;
    box-shadow:0 10px 22px -10px rgba(124,92,252,.65);
  }
  .item-badge.summary{
    background:linear-gradient(135deg, var(--pink), var(--gold));
    box-shadow:0 10px 22px -10px rgba(255,107,157,.55);
  }
  .item-badge.quiz{
    background:linear-gradient(135deg, #34d399, #4c8dff);
    box-shadow:0 10px 22px -10px rgba(52,211,153,.5);
  }

  .item-body{flex:1; position:relative; z-index:1; min-width:0;}
  .item-body h4{
    font-size:1rem;
    font-weight:800;
    margin-bottom:5px;
    letter-spacing:.01em;
  }
  .item-meta{
    display:flex; gap:10px; flex-wrap:wrap;
    font-size:.76rem;
    color:var(--text-2);
  }
  .item-meta span{display:flex; align-items:center; gap:4px;}

  .item-action{
    flex-shrink:0;
    position:relative; z-index:1;
    display:flex; align-items:center; gap:8px;
    font-size:.82rem;
    font-weight:700;
    letter-spacing:.02em;
    padding:9px 16px;
    border-radius:12px;
    color:var(--text-1);
    border:1px solid var(--glass-bd);
    white-space:nowrap;
    transition:all .3s var(--ease);
  }
  .item-card:hover .item-action{
    color:#fff;
    background:linear-gradient(120deg, var(--violet), var(--blue));
    border-color:transparent;
    box-shadow:0 8px 18px -8px rgba(124,92,252,.55);
  }
  .item-action.soon{
    color:var(--text-2);
  }
  .item-card:hover .item-action.soon{
    background:rgba(255,255,255,.08);
    color:var(--text-1);
    box-shadow:none;
  }

  .empty-state{
    text-align:center;
    padding:60px 20px;
    color:var(--text-2);
  }
  .empty-state .ic{font-size:2.4rem; margin-bottom:14px; display:block;}

  .sanad-cta{
    margin:10px auto 70px;
    padding:28px 26px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:20px;
    flex-wrap:wrap;
  }
  .sanad-cta .cta-copy h3{
    font-family:'Lalezar', cursive;
    font-size:1.45rem;
    margin-bottom:6px;
  }
  .sanad-cta .cta-copy h3 span{
    background:linear-gradient(100deg, var(--blue), var(--violet));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .sanad-cta .cta-copy p{
    color:var(--text-1);
    font-size:.9rem;
    line-height:1.7;
  }
  .sanad-cta .cta-btn{
    display:inline-flex; align-items:center; gap:8px;
    padding:13px 22px; border-radius:14px;
    background:linear-gradient(120deg, var(--violet), var(--blue));
    color:#fff; text-decoration:none; font-weight:800; font-size:.92rem;
    letter-spacing:.02em;
    box-shadow:0 10px 28px -8px rgba(124,92,252,.6), inset 0 1px 0 rgba(255,255,255,.18);
    transition:transform .3s var(--ease), box-shadow .3s;
    white-space:nowrap;
  }
  .sanad-cta .cta-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 14px 32px -8px rgba(124,92,252,.75);
  }

  @media(max-width:640px){
    .item-card{padding:16px; gap:12px;}
    .item-badge{width:44px; height:44px; font-size:1.2rem;}
    .item-action{padding:8px 12px; font-size:.76rem;}
    .cat-tab{padding:10px 18px; font-size:.85rem;}
    .subj-header .ic-wrap{width:72px; height:72px; border-radius:20px;}
    .sanad-cta{padding:22px 18px;}
    .sanad-cta .cta-btn{width:100%; justify-content:center;}
  }

  a:focus-visible, button:focus-visible{
    outline:2px solid var(--blue); outline-offset:3px;
  }
</style>
</head>
<body>

<div class="bg-mesh">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<div class="grain"></div>

<nav>
  <div class="nav-inner glass">
    <a href="index.html" class="logo">محلولة</a>
    <a href="index.html" class="back-link">الرئيسية ←</a>
  </div>
</nav>

<main>
  <div class="wrap">
    <div class="crumb">
      <a href="index.html">الرئيسية</a>
      <span class="sep">/</span>
      <a href="index.html#subjects">المواد</a>
      <span class="sep">/</span>
      <span class="current" id="crumbCurrent">المادة</span>
    </div>

    <div class="subj-header">
      <div class="ic-wrap"><span class="ic" id="subjIcon">📖</span></div>
      <h1><span id="subjTitle">المادة</span></h1>
      <p>كل الامتحانات والتلخيصات المتوفرة بمكان واحد</p>
      <div class="stats-row">
        <div class="stat-pill glass">📄 <b id="examCount">0</b> امتحان</div>
        <div class="stat-pill glass">📝 <b id="summaryCount">0</b> تلخيص</div>
        <div class="stat-pill glass">🧠 <b id="quizCount">0</b> كويز</div>
      </div>
    </div>

    <div class="cat-tabs">
      <div class="cat-tab active" data-cat="exams">
        📄 امتحانات <span class="count" id="tabExamCount">0</span>
      </div>
      <div class="cat-tab" data-cat="summaries">
        📝 تلخيصات <span class="count" id="tabSummaryCount">0</span>
      </div>
      <div class="cat-tab" data-cat="quizzes">
        🧠 كويزات إلكترونية <span class="count" id="tabQuizCount">0</span>
      </div>
    </div>

    <div class="item-list" id="itemList"></div>

    <div class="sanad-cta glass" data-od-id="subject-sanad-cta">
      <div class="cta-copy">
        <h3>علّقت بدرس؟ اسأل <span>سند</span></h3>
        <p id="sanadCtaText">سند جاهز يجاوبك من الكتاب الوزاري لهالمادة.</p>
      </div>
      <a class="cta-btn" id="sanadCtaLink" href="sanad.html">اسأل سند ←</a>
    </div>
  </div>
</main>

<script>
// ============ عدّل هون: ضيف روابط الملفات الحقيقية تبعك ============
// لكل مادة، عندك مصفوفتين: exams (امتحانات) و summaries (تلخيصات)
// كل عنصر: { title: "العنوان", meta: "وصف قصير", href: "رابط الملف", ready: true/false }
// إذا ready:false رح يظهر بشارة "قريبًا" وما يفتح رابط.

const SUBJECT_CONTENT = {
  "عربي": {
    title: "اللغة العربية",
    icon: "📖",
    exams: [
      { title: "امتحان نصف الفصل الأول", meta: "2025 · نصوص وقواعد", href: "#", ready: false },
      { title: "امتحان نهاية الفصل الأول", meta: "2025 · شامل", href: "#", ready: false },
      { title: "امتحان نصف الفصل الثاني", meta: "2024 · شامل", href: "#", ready: false }
    ],
    summaries: [
      { title: "تلخيص النصوص - الوحدة الأولى", meta: "PDF · صفحتين", href: "#", ready: false },
      { title: "تلخيص القواعد - النحو والصرف", meta: "PDF · 4 صفحات", href: "#", ready: false },
      { title: "تلخيص التعبير والبلاغة", meta: "PDF · 3 صفحات", href: "#", ready: false }
    ],
    quizzes: [
      { title: "كويز النحو والصرف", meta: "تفاعلي · 10 أسئلة", href: "#", ready: false },
      { title: "كويز النصوص الأدبية", meta: "تفاعلي · 12 سؤال", href: "#", ready: false }
    ]
  },
  "رياضيات": {
    title: "الرياضيات",
    icon: "➗",
    exams: [
      { title: "امتحان نصف الفصل الأول", meta: "2025 · جبر وهندسة", href: "#", ready: false },
      { title: "امتحان نهاية الفصل الأول", meta: "2025 · شامل", href: "#", ready: false },
      { title: "امتحان نصف الفصل الثاني", meta: "2024 · تفاضل", href: "#", ready: false }
    ],
    summaries: [
      { title: "تلخيص التوابع والنهايات", meta: "PDF · 3 صفحات", href: "#", ready: false },
      { title: "تلخيص المشتقات", meta: "PDF · 3 صفحات", href: "#", ready: false },
      { title: "تلخيص الهندسة الفراغية", meta: "PDF · 4 صفحات", href: "#", ready: false }
    ],
    quizzes: [
      { title: "كويز التوابع والنهايات", meta: "تفاعلي · 10 أسئلة", href: "#", ready: false },
      { title: "كويز المشتقات", meta: "تفاعلي · 8 أسئلة", href: "#", ready: false }
    ]
  },
  "تاريخ_الاردن": {
    title: "تاريخ الأردن",
    icon: "🏛️",
    exams: [
      { title: "امتحان نصف الفصل الأول", meta: "2025 · تأسيس الإمارة", href: "#", ready: false },
      { title: "امتحان نهاية الفصل الأول", meta: "2025 · شامل", href: "#", ready: false },
      { title: "امتحان نصف الفصل الثاني", meta: "2024 · شامل", href: "#", ready: false }
    ],
    summaries: [
      { title: "تلخيص تأسيس إمارة شرق الأردن", meta: "PDF · صفحتين", href: "#", ready: false },
      { title: "تلخيص مرحلة الاستقلال", meta: "PDF · 3 صفحات", href: "#", ready: false },
      { title: "تلخيص العهد الهاشمي", meta: "PDF · 3 صفحات", href: "#", ready: false }
    ],
    quizzes: [
      { title: "كويز تأسيس الإمارة", meta: "تفاعلي · 10 أسئلة", href: "#", ready: false },
      { title: "كويز مرحلة الاستقلال", meta: "تفاعلي · 8 أسئلة", href: "#", ready: false }
    ]
  },
  "تربية_اسلامية": {
    title: "التربية الإسلامية",
    icon: "🕌",
    exams: [
      { title: "امتحان نصف الفصل الأول", meta: "2025 · فقه وتفسير", href: "#", ready: false },
      { title: "امتحان نهاية الفصل الأول", meta: "2025 · شامل", href: "#", ready: false },
      { title: "امتحان نصف الفصل الثاني", meta: "2024 · شامل", href: "#", ready: false }
    ],
    summaries: [
      { title: "تلخيص أحكام الفقه", meta: "PDF · 3 صفحات", href: "#", ready: false },
      { title: "تلخيص التفسير", meta: "PDF · صفحتين", href: "#", ready: false },
      { title: "تلخيص السيرة النبوية", meta: "PDF · 4 صفحات", href: "#", ready: false }
    ],
    quizzes: [
      { title: "كويز أحكام الفقه", meta: "تفاعلي · 10 أسئلة", href: "#", ready: false },
      { title: "كويز السيرة النبوية", meta: "تفاعلي · 8 أسئلة", href: "#", ready: false }
    ]
  }
};
// ==================================================================

const params = new URLSearchParams(window.location.search);
let subjectKey = params.get('s');
if(!subjectKey || !SUBJECT_CONTENT[subjectKey]) subjectKey = "رياضيات";

const data = SUBJECT_CONTENT[subjectKey];
let activeCat = 'exams';

document.getElementById('crumbCurrent').textContent = data.title;
document.getElementById('subjTitle').textContent = data.title;
document.getElementById('subjIcon').textContent = data.icon;
document.getElementById('examCount').textContent = data.exams.length;
document.getElementById('summaryCount').textContent = data.summaries.length;
document.getElementById('quizCount').textContent = data.quizzes.length;
document.getElementById('tabExamCount').textContent = data.exams.length;
document.getElementById('tabSummaryCount').textContent = data.summaries.length;
document.getElementById('tabQuizCount').textContent = data.quizzes.length;
document.title = data.title + ' | محلولة';

const sanadLink = document.getElementById('sanadCtaLink');
const sanadText = document.getElementById('sanadCtaText');
if (sanadLink) sanadLink.href = 'sanad.html?s=' + encodeURIComponent(subjectKey);
if (sanadText) sanadText.textContent = 'سند جاهز يجاوبك من كتاب ' + data.title + ' الوزاري.';

const itemListEl = document.getElementById('itemList');
const tabs = document.querySelectorAll('.cat-tab');

function renderList(){
  const items = data[activeCat];
  itemListEl.innerHTML = '';

  if(items.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty-state glass';
    empty.innerHTML = '<span class="ic">🗂️</span> لسا ما في محتوى مضاف هون - قريبًا إن شاء الله.';
    itemListEl.appendChild(empty);
    return;
  }

  items.forEach((item, i) => {
    const card = document.createElement('a');
    card.className = 'item-card glass';
    card.href = item.ready ? item.href : 'javascript:void(0)';
    if(item.ready) { card.target = '_blank'; card.rel = 'noopener noreferrer'; }

    const badgeIcon = activeCat === 'exams' ? '📄' : (activeCat === 'summaries' ? '📝' : '🧠');
    const badgeClass = activeCat === 'exams' ? '' : (activeCat === 'summaries' ? 'summary' : 'quiz');
    const actionText = item.ready ? (activeCat === 'exams' ? 'تحميل' : (activeCat === 'summaries' ? 'عرض' : 'ابدأ الكويز')) : 'قريبًا';
    const actionClass = item.ready ? '' : 'soon';

    card.innerHTML = `
      <div class="item-badge ${badgeClass}">${badgeIcon}</div>
      <div class="item-body">
        <h4>${item.title}</h4>
        <div class="item-meta"><span>${item.meta}</span></div>
      </div>
      <div class="item-action ${actionClass}">${actionText} ${item.ready ? '↓' : ''}</div>
    `;
    itemListEl.appendChild(card);
  });
}

tabs.forEach(tab => {
  tab.addEventListener('click', () => {
    activeCat = tab.dataset.cat;
    tabs.forEach(t => t.classList.toggle('active', t === tab));
    renderList();
  });
});

renderList();
</script>

</body>
</html>
