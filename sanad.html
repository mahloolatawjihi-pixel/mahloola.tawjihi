<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>سند | محلولة</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lalezar&family=Tajawal:wght@300;400;500;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg-0: #080a14;
      --bg-1: #0d1122;
      --bg-2: #12172b;
      --violet: #7c5cfc;
      --blue: #4c8dff;
      --pink: #ff6b9d;
      --text-0: #f3f4fb;
      --text-1: #aab0cc;
      --text-2: #727a9c;
      --glass-bd: rgba(255, 255, 255, 0.1);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --shadow-soft: 0 18px 50px -20px rgba(0, 0, 0, .55);
      --ease: cubic-bezier(.22, 1, .36, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    ::selection {
      background: color-mix(in srgb, var(--violet) 45%, transparent);
      color: #fff;
    }

    body {
      background: var(--bg-0);
      color: var(--text-0);
      font-family: 'Tajawal', sans-serif;
      overflow-x: hidden;
      position: relative;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: .32;
      will-change: transform;
    }

    .blob-1 {
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, var(--violet), transparent 70%);
      top: -140px;
      right: -120px;
      animation: drift1 22s ease-in-out infinite;
    }

    .blob-2 {
      width: 420px;
      height: 420px;
      background: radial-gradient(circle, var(--blue), transparent 70%);
      bottom: -160px;
      left: -100px;
      animation: drift2 26s ease-in-out infinite;
    }

    @keyframes drift1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(-50px, 50px) scale(1.15);
      }
    }

    @keyframes drift2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      50% {
        transform: translate(50px, -30px) scale(1.1);
      }
    }

    section,
    header,
    footer,
    main,
    nav {
      position: relative;
      z-index: 2;
    }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 20px;
      width: 100%;
    }

    .glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-bd);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border-radius: 22px;
      box-shadow: var(--shadow-soft), inset 0 1px 0 rgba(255, 255, 255, .06);
    }

    nav {
      padding: 18px 0;
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 22px;
      border-radius: 999px;
    }

    .logo {
      font-family: 'Lalezar', cursive;
      font-size: 1.4rem;
      text-decoration: none;
      background: linear-gradient(90deg, var(--blue), var(--violet) 60%, var(--pink));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .back-link {
      color: var(--text-1);
      text-decoration: none;
      font-size: .9rem;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border-radius: 999px;
      transition: color .25s, background .25s;
    }

    .back-link:hover {
      color: var(--text-0);
      background: rgba(255, 255, 255, .06);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 10px 0 20px;
    }

    .chat-shell {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 0 20px;
      min-height: 0;
    }

    .chat-head {
      text-align: center;
      padding: 6px 0 18px;
    }

    .chat-head h1 {
      font-family: 'Lalezar', cursive;
      font-size: 2rem;
      letter-spacing: -.01em;
      margin-bottom: 6px;
    }

    .chat-head h1 span {
      background: linear-gradient(100deg, var(--blue), var(--violet));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .chat-head p {
      color: var(--text-1);
      font-size: .88rem;
      line-height: 1.7;
    }

    .subject-tabs {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .subj-tab {
      padding: 9px 18px;
      border-radius: 999px;
      font-size: .85rem;
      font-weight: 700;
      letter-spacing: .02em;
      cursor: pointer;
      color: var(--text-1);
      border: 1px solid var(--glass-bd);
      background: rgba(255, 255, 255, .03);
      transition: all .3s var(--ease);
    }

    .subj-tab:hover {
      color: var(--text-0);
      border-color: rgba(255, 255, 255, .18);
      background: rgba(255, 255, 255, .05);
    }

    .subj-tab.active {
      color: #fff;
      background: linear-gradient(120deg, var(--violet), var(--blue));
      border-color: transparent;
      box-shadow: 0 6px 20px -6px rgba(124, 92, 252, .6), inset 0 1px 0 rgba(255, 255, 255, .18);
    }

    .chat-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0;
      overflow: hidden;
      position: relative;
    }

    .chat-panel::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(160deg, rgba(124, 92, 252, .35), transparent 42%, rgba(76, 141, 255, .28));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 1;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 26px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 320px;
      max-height: 56vh;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar {
      width: 6px;
    }

    .messages::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, .12);
      border-radius: 10px;
    }

    .msg-row {
      display: flex;
      max-width: 100%;
      animation: msgIn .35s var(--ease) both;
    }

    .msg-row.user {
      justify-content: flex-start;
    }

    .msg-row.bot {
      justify-content: flex-end;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bubble {
      max-width: 78%;
      padding: 13px 17px;
      border-radius: 18px;
      font-size: .92rem;
      line-height: 1.85;
      white-space: pre-wrap;
      box-shadow: 0 8px 22px -14px rgba(0, 0, 0, .5);
    }

    .bubble.user {
      background: linear-gradient(120deg, var(--violet), var(--blue));
      color: #fff;
      border-bottom-left-radius: 5px;
      box-shadow: 0 10px 24px -12px rgba(124, 92, 252, .55);
    }

    .bubble.bot {
      background: rgba(255, 255, 255, .055);
      border: 1px solid var(--glass-bd);
      border-bottom-right-radius: 5px;
    }

    .bubble.bot.apology {
      border-color: rgba(255, 107, 157, .4);
      background: rgba(255, 107, 157, .06);
    }

    .source-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      margin-top: 10px;
      padding: 5px 11px;
      border-radius: 999px;
      background: rgba(124, 92, 252, 0.14);
      border: 1px solid rgba(124, 92, 252, 0.32);
      color: var(--text-0);
      font-size: 0.74rem;
      font-weight: 600;
      letter-spacing: .02em;
    }

    .typing {
      display: flex;
      gap: 5px;
      padding: 4px 2px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-1);
      animation: blink 1.2s infinite ease-in-out;
    }

    .typing span:nth-child(2) {
      animation-delay: .2s;
    }

    .typing span:nth-child(3) {
      animation-delay: .4s;
    }

    @keyframes blink {

      0%,
      80%,
      100% {
        opacity: .25;
        transform: translateY(0);
      }

      40% {
        opacity: 1;
        transform: translateY(-3px);
      }
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 0 22px 16px;
    }

    .chip {
      font-size: .78rem;
      padding: 8px 14px;
      border-radius: 999px;
      color: var(--text-1);
      border: 1px solid var(--glass-bd);
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
      transition: all .25s var(--ease);
      letter-spacing: .01em;
    }

    .chip:hover {
      color: var(--text-0);
      border-color: rgba(124, 92, 252, .4);
      background: rgba(124, 92, 252, .1);
      transform: translateY(-2px);
    }

    .composer {
      display: flex;
      gap: 10px;
      padding: 16px 18px;
      border-top: 1px solid var(--glass-bd);
      background: rgba(0, 0, 0, .12);
      position: relative;
      z-index: 2;
    }

    .composer input {
      flex: 1;
      background: rgba(255, 255, 255, .045);
      border: 1px solid var(--glass-bd);
      color: var(--text-0);
      border-radius: 14px;
      padding: 13px 16px;
      font-family: 'Tajawal', sans-serif;
      font-size: .95rem;
      outline: none;
      transition: border-color .25s, box-shadow .25s, background .25s;
    }

    .composer input::placeholder {
      color: var(--text-2);
    }

    .composer input:focus {
      border-color: rgba(124, 92, 252, .55);
      background: rgba(255, 255, 255, .06);
      box-shadow: 0 0 0 3px rgba(124, 92, 252, .15);
    }

    .send-btn {
      background: linear-gradient(120deg, var(--violet), var(--blue));
      border: none;
      color: #fff;
      width: 50px;
      border-radius: 14px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform .25s var(--ease), opacity .2s, box-shadow .25s;
      flex-shrink: 0;
      box-shadow: 0 8px 20px -8px rgba(124, 92, 252, .65);
    }

    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px -8px rgba(124, 92, 252, .8);
    }

    .send-btn:disabled {
      opacity: .5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .note {
      text-align: center;
      color: var(--text-2);
      font-size: .75rem;
      padding: 14px 0 0;
      letter-spacing: .01em;
      line-height: 1.6;
    }

    .chat-tools {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .tool-btn {
      padding: 7px 14px;
      border-radius: 999px;
      font-size: .78rem;
      font-weight: 700;
      letter-spacing: .02em;
      color: var(--text-1);
      border: 1px solid var(--glass-bd);
      background: rgba(255, 255, 255, .03);
      cursor: pointer;
      font-family: 'Tajawal', sans-serif;
      transition: all .25s var(--ease);
    }

    .tool-btn:hover {
      color: var(--text-0);
      border-color: rgba(255, 255, 255, .2);
      background: rgba(255, 255, 255, .06);
    }

    .kbd-hint {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: .72rem;
      color: var(--text-2);
      padding: 0 4px 10px 22px;
    }

    .kbd-hint kbd {
      font-family: 'Tajawal', sans-serif;
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 6px;
      border: 1px solid var(--glass-bd);
      background: rgba(255, 255, 255, .04);
      color: var(--text-1);
    }

    .welcome-card {
      text-align: center;
      padding: 28px 18px 10px;
      color: var(--text-1);
    }

    .welcome-card .w-av {
      width: 56px;
      height: 56px;
      margin: 0 auto 14px;
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lalezar', cursive;
      font-size: 1.5rem;
      color: #fff;
      background: linear-gradient(135deg, var(--violet), var(--blue));
      box-shadow: 0 12px 28px -10px rgba(124, 92, 252, .7);
    }

    .welcome-card h2 {
      font-family: 'Lalezar', cursive;
      font-size: 1.35rem;
      color: var(--text-0);
      margin-bottom: 8px;
    }

    .welcome-card p {
      font-size: .88rem;
      line-height: 1.8;
      max-width: 360px;
      margin: 0 auto;
    }

    @media(max-width:640px) {
      .messages {
        max-height: 50vh;
      }

      .bubble {
        max-width: 88%;
      }

      .kbd-hint { display: none; }
    }

    a:focus-visible,
    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--blue);
      outline-offset: 2px;
    }
  </style>
</head>

<body>

  <div class="bg-mesh">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <nav>
    <div class="nav-inner glass">
      <a href="index.html" class="logo">محلولة</a>
      <a href="index.html" class="back-link">الرئيسية ←</a>
    </div>
  </nav>

  <main>
    <div class="chat-shell">
      <div class="chat-head">
        <h1>احكي مع <span>سند</span></h1>
        <p>اختار المادة، واسأل سند أي سؤال - جوابه دايمًا من الكتاب الوزاري بس.</p>
      </div>

      <div class="subject-tabs" id="subjectTabs">
        <div class="subj-tab" data-subject="عربي" role="button" tabindex="0">اللغة العربية</div>
        <div class="subj-tab" data-subject="رياضيات" role="button" tabindex="0">الرياضيات</div>
        <div class="subj-tab" data-subject="تاريخ_الاردن" role="button" tabindex="0">تاريخ الأردن</div>
        <div class="subj-tab" data-subject="تربية_اسلامية" role="button" tabindex="0">التربية الإسلامية</div>
      </div>

      <div class="chat-tools">
        <button type="button" class="tool-btn" id="clearChat" title="مسح المحادثة">مسح المحادثة</button>
        <button type="button" class="tool-btn" id="focusInput" title="ركز على الكتابة">اكتب سؤال</button>
      </div>

      <div class="chat-panel glass">
        <div class="messages" id="messages"></div>
        <div class="chips" id="chips"></div>
        <div class="kbd-hint">اضغط <kbd>Enter</kbd> للإرسال · اختار مادة من فوق</div>
        <div class="composer">
          <input type="text" id="userInput" placeholder="اكتب سؤالك هون..." autocomplete="off">
          <button class="send-btn" id="sendBtn" aria-label="إرسال">↑</button>
        </div>
      </div>

      <p class="note">سند بيجاوب بس من الكتب الوزارية الأربعة، وإذا السؤال برا المنهاج رح يعتذر ويرجعّك لها.</p>
    </div>
  </main>

وا‬ ‫رفض سكان‬\n‫املتمّردين قاسم‬\n ‫ّ‬ ‫بالتمرد واالحتجاج عىل إبراهيم باشا يف البلقاء والكرك يف عام (‪1834‬م)‪ .‬وكان من بني‬\n‫األمحد أحد الزعامء املح ّّليني يف منطقة نابلس‪ ،‬الذي ّفّر إىل الكرك واعتصم فيها؛ وإثر ذلك حارص إبراهيم‬\n ‫قيد‬\n‫باشا الكرك ورضب قلعتها باملدفعية‪ ،‬واستطاع قاسم األمحد اهلروب من الكرك واللجوء للسلط‪ ،‬فحارصها‬\n ‫إبراهيم باشا ود ّّمر قلعتها‪ ،‬ومل يبق من هذه القلعة سوى بعض أساسات األسوار واخلندق املحيط هبا‪.‬‬\n‫التمّرد يف‬\n ‫بتمّرد مماثل ملا حدث يف البلقاء والكرك يف عام (‪1839‬م)؛ إذ أسهم هذا ّ‬\n ‫قام سكان جبل عجلون ّ‬\n‫اضطّرت لالنسحاب من بالد الشام والعودة إىل مرص بعد ضغط الدول‬ ‫إضعاف قوات إبراهيم باشا التي‬\n ‫ا‬\n ‫ّ‬\n ‫إلع‬\n\n ‫األوروبية عىل حممد عيل باشا برضورة االنسحاب من بالد الشام‪.‬‬\n ‫ّ‬\n‫األردّن تتبع‬ ‫ّ‬\n ‫األردّن إىل ما كانت عليه قبل احلكم املرصي‪ ،‬وبقيت أجزاء من‬ ‫عادت اإلدارة العثامنية يف‬\n ‫يتكّون من قضاءين مها‪ :‬قضاء‬ ‫ّ‬\n ‫األردّن ّ‬ ‫والية سوريا‪ ،‬وأصبح‬\n ‫عجلون التابع للواء حوران ومركزه درعا‪ ،‬وقضاء البلقاء‬\n ‫داد‬\n\n ‫التابع للواء نابلس التابع لوالية بريوت‪ ،‬كام تشّكّل قضاء‬\n ‫حتّول يف ما بعد إىل لواء الكرك يف عام (‪1894‬م)‪.‬‬\n ‫معان الذي ّ‬\n ‫حاولت الدولة العثامنية يف هذه الفرتة توطني القبائل البدوية‬\n ‫وتشجيع استقرارها وتنمية الزراعة‪ ،‬عن طريق إنشاء املرصف‬\n ‫الزراعي لتقديم القروض للفاّلا حني‪ ،‬وإدخال طرائق‬\n ‫الصورة (‪ :)1‬عربة ملزارعني رشاكسة ينقلون‬ ‫جديدة يف الزراعة‪ ،‬وتوطني املهاجرين الرشاكسة والشيشان‬\n ‫عليها املحاصيل الزراعية‪.‬‬ ‫الذين ُُه ّّجروا من بالدهم القفقــاس بعد حرب دامية مع‬\n\n ‫‪85‬‬"},{"p":86,"t":"‫اإلمرباطورية الروسية القيرصية‪ ،‬وجرى إسكاهنم عىل طول ّ‬\n‫خّط سّكّة احلديد يف األناضول وبالد الشام‪.‬‬\n‫أ ّّما املواقع األردنية التي سكنوها فهي‪ :‬الزرقاء والسخنة وجرش وعاّما ن وصويلح ووادي السري وناعور‪،‬‬\n ‫ّ‬\n ‫األردّن‪.‬‬ ‫دوٌر يف تطوير احلياة االقتصادية واالجتامعية والثقافية يف‬\n ‫وكان هلم ٌ‬\n‫شارك األردن ّّيون يف املجالس املنتخبة يف الدولة العثامنية كاملجلس العمومي لوالية سوريا وجملس (املبعوثان)‬\n ‫مثّل األردن يف جملس الوالية العمومي ٌ‬\n‫كٌّل من‪ :‬عودة ال سـامي البريطاني‪ ،‬فـــي القاهرة‪ ،‬في عا ََمي‬\n‫تعبًريا عن األهداف والتط ّّلعات العربية املرشوعة‪ ،‬كام عرّبر ت عن أدبيات وأفكار احلركة‬\n ‫(‪1916 - 1915‬م)‪ً ،‬‬\n ‫العربية وبياناهتا ومواقفها يف هذه املرحلة‪.‬‬\n\n ‫خة‬\n ‫مراسالت احلسني ‪ -‬مكامهون (املراسالت التارخيية)‬\n ‫ُتُنسب مراسالت احلسني ‪ -‬مكامهون إىل الرشيف احلسني بن عيل‪ ،‬والسري هنري مكامهون‪ ،‬املندوب السامي‬\n ‫الربيطاين يف مرص‪ .‬وقد تأ ّّلفت من مخس رسائل بعثها الرشيف احلسني إىل السري هنري مكامهون‪ ،‬ومخس‬\n ‫قيد‬ ‫رسائل تل ّّقاها الرشيف احلسني من السري هنري مكامهون‪.‬‬\n\n‫ثّم ُُأجيب عاّما يليه‪:‬‬\n ‫النّص اآليت من رسالة الرشيف احلسني بن عيل األوىل إىل السري هنري مكامهون‪ّ ،‬‬\n ‫أتأ ّّمل ّ‬\n\n ‫“يـرى الشـعب العربـي أ ّّنه من املناسـب أن يسـأل احلكومـة البريطانية إذا كانـت ترى من املناسـب أن تصادق‬\n ‫ا‬\n ‫بواسـطة مندوبيها أو ممثليهـا على االقتراحات األساسـية اآلتية‪:‬‬\n ‫إلع‬\n\n ‫أن تعتـرف إجنلتـرا باسـتقالل الـبالد العربيـة من مرسني ــ أذنة (أضنـة)‪ ،‬ح ّّتى اخلليج الفارسـي شـمااًلا ‪،‬‬\n ‫ومـن بالد فـارس حتـى خليـج البصرة شـرًقًا‪ ،‬ومن احمليط الهنـدي للجزيرة جنوًبًا يسـتثنى مـن ذلك عدن‬\n ‫التـي تبقـى كمـا هـي‪ ،‬ومـن البحـر األحمـر والبحـر املتوسـط حتى سـينا غر�بـا‪ .‬علـى أن توافـق إجنلترا‬\n ‫أيًضـًا عـلى إعالن خليـفة عربي على املـسلمني‪...‬‬\n ‫هـذا و ّّملا كان الشـعب العربـي بأجمعـه قد اتفـق “واحلمـد هلل” على بلـوغ الغاية وحتقيـق الفكرة مهما‬\n ‫وًمـا من وصول‬‫سـلًبا أو إيجاًبًا فـي خالل ثالثني ي ً‬ ‫ك ّّلفـه األمـر فهـو يرجـو احلكومـة البريطانية أن جتيبـه‬\n ‫داد‬\n\n ‫ً‬\n ‫يتلَّق مـن احلكومة جواًبًا؛ فإنـه يحفظ لنفسـه حرية العمل‬ ‫هـذا االقتـراح‪ .‬وإذا انقضـت هـذه املدة ولـم َ‬\n ‫كما يشـاء”‪.‬‬\n ‫(ُمقتبس من رسالة الشريف احلسني بن علي األولى‬‫ُ‬\n ‫للسير هنري مكماهون في تاريخ ‪ 14‬متوز ‪1915‬م)‪.‬‬\n\n ‫باسم ََمن كان الشريف الحسين يتحّدّ ث في هذه المراسالت؟‬\n ‫برأيي‪ ،‬لماذا حّدّ د الشريف الحسين مهلة ثالثين يو ًًما لتل ّّقي اإلجابة البريطانية؟‬\n\n ‫‪103‬‬"},{"p":104,"t":"‫أتحّقق من تع ّّلمي‬\n ‫ّ‬\n\n ‫‪ُ -‬‬\n ‫ ُأب ّّين أهداف الثورة العربية الكبرى‪.‬‬\n ‫وّضح مضامين ميثاق \n ‫ب‪ .‬العصبية‪.‬‬ ‫أ ‪ .‬املؤاخاة‪ .‬‬\n ‫‪ .2‬من األد َّلة الرشعية التي ُت ِّذر من العن رصية بصورة مبارشة‪:‬‬\n ‫اب»‪.‬‬ ‫اس َب ُنو آ َد َم‪َ ،‬وآ َد ُم ُخ ِلقَ ِم ْن ت َُر ٍ‬ ‫ ‌ أ ‪ .‬قوله ﷺ‪« :‬ال َّن ُ‬\n ‫ب‪ .‬قوله تعاىل‪﴿ :‬ﲫ ﲬ ﲭ﴾‪.‬‬\n ‫َعاط ِف ِه ْم َمث َُل ا ْل َج َس ِد»‪.‬‬ ‫نين في تَوا ِّد ِه ْم َوت ُ‬\n ‫َراح ِم ِه ْم َوت ُ‬ ‫ ‌ قوله ﷺ‪َ « :‬مث َُل ا ْل ُم ْؤ ِم َ‬\n ‫د ‪ .‬قوله ﷺ‪َ « :‬د ُع وها؛ َف إِ َّنا ُم ْن تِ َن ٌة»‪.‬‬\n ‫قوي الوحدة الوطنية‪ ،‬هو‪:‬‬\n ‫‪ .3‬يشري قوله تعاىل‪﴿ :‬ﱄ ﱅ ﱆ ﱇ ﱈ﴾ إىل مبدأ ُي ّ‬\n ‫ب‪ .‬التحذير من ُ‬\n ‫الف ْرقة‪.‬‬ ‫التعصب‪ .‬‬\n ‫ُّ‬ ‫أ ‪ .‬حماربة‬\n ‫د‪ .‬املساواة‪.‬‬ ‫تقب ل االختالف‪ .‬‬\n ‫ُّ‬\n‫‪151‬‬"},{"p":152,"t":"‫ةعجارملاو‬\n\n ‫دادعإلا‬\n ‫ديق‬\n\n‫‪152‬‬"},{"p":153,"t":"‫‪153‬‬\n ‫ةعجارملاو‬\n\n ‫دادعإلا‬\n ‫ديق‬"}]};

</script>
  <script>
    const SUBJECT_LABELS = {
      "عربي": "اللغة العربية",
      "رياضيات": "الرياضيات",
      "تاريخ_الاردن": "تاريخ الأردن",
      "تربية_اسلامية": "التربية الإسلامية"
    };

    const SUBJECT_CHIPS = {
      "عربي": ["لخصلي درس النحو الأول", "شو الفرق بين النعت والحال؟", "اشرحلي أسلوب التوكيد"],
      "رياضيات": ["اشرحلي درس النهايات", "كيف بحسب مشتقة تابع؟", "شو هو التابع الثابت؟"],
      "تاريخ_الاردن": ["لخصلي أهم أحداث تأسيس إمارة شرق الأردن", "شو دور الشريف حسين؟", "اشرحلي مرحلة الاستقلال"],
      "تربية_اسلامية": ["اشرحلي حكم الوضوء", "لخصلي الدرس عن الصدق", "شو معنى الآية اللي درسناها؟"]
    };

    const APOLOGY_TEXT = "عذرًا، ما بقدر أجاوبك على هذا السؤال 🙏 جرّب ترجع للكتب الوزارية الأربعة، وبإذن الله تلاقي الجواب فيها.";

    let normCache = {};

    function normalizeArabic(s) {
      return s
        .replace(/[\u064B-\u0652\u0670\u0640]/g, '')
        .replace(/[إأآا]/g, 'ا')
        .replace(/ى/g, 'ي')
        .replace(/ة/g, 'ه')
        .replace(/[^\u0600-\u06FF\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    const STOP = new Set(["من", "في", "على", "الى", "إلى", "عن", "كيف", "ما", "ماذا", "هل", "انا", "أنا", "هذا", "هذه", "هذي", "التي", "الذي", "و", "او", "أو", "ثم", "كان", "يكون", "ايش", "اش", "لو", "بس", "يا", "مش", "انت", "إنت", "ليش", "كم", "اي", "أي", "لماذا"]);

    function stripAl(w) {
      return (w.startsWith('ال') && w.length > 4) ? w.slice(2) : w;
    }

    function tokenize(s) {
      return normalizeArabic(s).split(' ')
        .filter(w => w.length >= 2 && !STOP.has(w))
        .map(stripAl);
    }

    function getNormPages(subject) {
      if (!normCache[subject]) {
        normCache[subject] = SANAD_BOOKS[subject].map(p => ({ p: p.p, t: p.t, norm: normalizeArabic(p.t) }));
      }
      return normCache[subject];
    }

    function retrieveContext(subject, query, k) {
      k = k || 9;
      const pages = getNormPages(subject);
      const qTokens = tokenize(query);
      if (qTokens.length === 0) return [];
      const scored = [];
      for (const pg of pages) {
        let score = 0;
        for (const t of qTokens) {
          if (pg.norm.includes(t)) {
            score += t.length >= 4 ? 2 : 1; // كلمات أطول = تطابق أقوى وأدق
          } else if (t.length >= 5 && pg.norm.includes(t.slice(0, Math.ceil(t.length * 0.7)))) {
            score += 1; // تطابق جزئي (جذر الكلمة) يلحق تصريفات مختلفة لنفس الكلمة
          }
        }
        if (score > 0) scored.push({ p: pg.p, t: pg.t, score });
      }
      scored.sort((a, b) => b.score - a.score);
      const top = scored.slice(0, k);
      top.sort((a, b) => a.p - b.p);
      return top;
    }

    let currentSubject = "عربي";
    let history = [];
    let isLoading = false;

    const messagesEl = document.getElementById('messages');
    const chipsEl = document.getElementById('chips');
    const inputEl = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const tabsEl = document.getElementById('subjectTabs');

    function addBubble(role, text, extraClass, sourcePage) {
      const row = document.createElement('div');
      row.className = 'msg-row ' + (role === 'user' ? 'user' : 'bot');
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + (role === 'user' ? 'user' : 'bot') + (extraClass ? ' ' + extraClass : '');
      bubble.textContent = text;

      row.appendChild(bubble);

      // إذا رد من البوت ومعاه رقم صفحة، بنضيف شارة المصدر تحت الجواب
      if (role === 'bot' && sourcePage) {
        const sourceBadge = document.createElement('div');
        sourceBadge.className = 'source-badge';
        sourceBadge.innerHTML = `<span>📖 مصدر الوزارة: صفحة ${sourcePage}</span>`;
        bubble.appendChild(sourceBadge);
      }

      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return row;
    }

    function addTyping() {
      const row = document.createElement('div');
      row.className = 'msg-row bot';
      row.id = 'typingRow';
      const bubble = document.createElement('div');
      bubble.className = 'bubble bot';
      bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
      row.appendChild(bubble);
      messagesEl.appendChild(row);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    function removeTyping() {
      const row = document.getElementById('typingRow');
      if (row) row.remove();
    }

    function renderChips(subject) {
      chipsEl.innerHTML = '';
      (SUBJECT_CHIPS[subject] || []).forEach(text => {
        const chip = document.createElement('div');
        chip.className = 'chip';
        chip.textContent = text;
        chip.addEventListener('click', () => {
          inputEl.value = text;
          sendMessage();
        });
        chipsEl.appendChild(chip);
      });
    }

    function switchSubject(subject) {
      currentSubject = subject;
      history = [];
      messagesEl.innerHTML = '';
      tabsEl.querySelectorAll('.subj-tab').forEach(t => {
        const on = t.dataset.subject === subject;
        t.classList.toggle('active', on);
        t.setAttribute('aria-selected', on ? 'true' : 'false');
      });
      const welcome = document.createElement('div');
      welcome.className = 'welcome-card';
      welcome.innerHTML = `
        <div class="w-av">س</div>
        <h2>أهلاً، أنا سند</h2>
        <p>جاهز أساعدك بمادة <b style="color:var(--text-0)">${SUBJECT_LABELS[subject]}</b>. اسألني أي سؤال من الكتاب الوزاري.</p>
      `;
      messagesEl.appendChild(welcome);
      renderChips(subject);
      inputEl.placeholder = `اسأل عن ${SUBJECT_LABELS[subject]}...`;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isLoading) return;

      inputEl.value = '';
      addBubble('user', text);
      history.push({ role: 'user', content: text });

      isLoading = true;
      sendBtn.disabled = true;
      addTyping();

      // ندور على الصفحات الأكثر صلة بسؤال الطالب من كتاب المادة الحالية
      const topPages = retrieveContext(currentSubject, text, 4);
      let isMathQuery = /[\d+\-*/=×÷\(\)]/.test(text) && (text.includes('*') || text.includes('×') || text.includes('+') || text.includes('-') || text.includes('/') || text.includes('=') || text.includes('كم'));

      if (isMathQuery) {
        topPages.push({ p: "خارج الكتاب", t: `سؤال حسابي أو رياضي: ${text}` });
      }

      if (topPages.length === 0) {
        removeTyping();
        addBubble('bot', APOLOGY_TEXT, 'apology');
        history.push({ role: 'assistant', content: APOLOGY_TEXT });
        isLoading = false;
        sendBtn.disabled = false;
        inputEl.focus();
        return;
      }

      const context = topPages.map(pg => `[صفحة ${pg.p}]\n${pg.t}`).join('\n\n---\n\n');

      try {
        const response = await fetch('https://mahloola-tawjihi.onrender.com/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: text,
            subject: SUBJECT_LABELS[currentSubject],
            history: history,
            context: context
          })
        });

        const data = await response.json();
        removeTyping();
        const isApology = (data.reply || '').includes('عذرًا، ما بقدر أجاوبك');

        // جلب رقم أول صفحة كمصدر للجواب
        const sourcePage = (topPages.length > 0 && !isApology) ? topPages[0].p : null;

        addBubble('bot', data.reply, isApology ? 'apology' : '', sourcePage);
        history.push({ role: 'assistant', content: data.reply });

      } catch (error) {
        removeTyping();
        addBubble('bot', "سيرفر سند غير متصل حالياً! تأكد أنك كتبت node server.js في الـ Terminal.");
      }

      isLoading = false;
      sendBtn.disabled = false;
      inputEl.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') sendMessage();
    });
    tabsEl.querySelectorAll('.subj-tab').forEach(tab => {
      tab.addEventListener('click', () => switchSubject(tab.dataset.subject));
      tab.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          switchSubject(tab.dataset.subject);
        }
      });
    });

    document.getElementById('clearChat').addEventListener('click', () => {
      if (isLoading) return;
      switchSubject(currentSubject);
      inputEl.focus();
    });
    document.getElementById('focusInput').addEventListener('click', () => inputEl.focus());

    const params = new URLSearchParams(window.location.search);
    const qSubject = params.get('s');
    if (qSubject && SUBJECT_LABELS[qSubject]) currentSubject = qSubject;

    switchSubject(currentSubject);
    inputEl.focus();
  </script>
